<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Solicitudes</title>
    <link rel="stylesheet" href="estilos-gestion.css">
</head>
<body>
    <h1>Gestión de Solicitudes</h1>

    <div class="filtros-busqueda">
        <label for="filtro-motivo">Filtrar por Motivo:</label>
        <select id="filtro-motivo">
            <option value="">Todos</option>
        </select>
        <label for="filtro-estado">Filtrar por Estado:</label>
        <select id="filtro-estado">
            <option value="">Todos</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Respondida">Respondida</option>
        </select>
        <label for="filtro-fecha">Filtrar por Fecha:</label>
        <input type="date" id="filtro-fecha">
    </div>

    <div id="lista-solicitudes">
    </div>

    <script src="script-gestion.js"></script>
</body>
</html>
